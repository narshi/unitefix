
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  .hub-root {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px 0 32px;
    user-select: none;
    min-height: 560px;
    position: relative;
  }

  .wheel-wrap {
    position: relative;
    width: 420px;
    height: 420px;
    flex-shrink: 0;
  }

  /* Center logo */
  .hub-center {
    position: absolute;
    left: 50%; top: 50%;
    transform: translate(-50%, -50%);
    width: 110px; height: 110px;
    border-radius: 50%;
    background: var(--color-background-primary);
    border: 1.5px solid var(--color-border-secondary);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
    z-index: 20;
    box-shadow: 0 0 0 6px var(--color-background-secondary);
    transition: transform 0.3s ease;
  }

  .hub-logo {
    font-size: 13px;
    font-weight: 500;
    color: var(--color-text-primary);
    letter-spacing: 0.03em;
  }

  .hub-tagline {
    font-size: 10px;
    color: var(--color-text-tertiary);
  }

  /* SVG ring canvas */
  .ring-svg {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    overflow: visible;
  }

  /* Category pill buttons */
  .cat-btn {
    position: absolute;
    transform: translate(-50%, -50%);
    width: 72px; height: 72px;
    border-radius: 50%;
    border: 1.5px solid var(--color-border-tertiary);
    background: var(--color-background-primary);
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
    transition: all 0.25s cubic-bezier(0.34,1.56,0.64,1);
    z-index: 10;
    font-size: 0;
  }

  .cat-btn svg { width: 22px; height: 22px; stroke: var(--color-text-secondary); fill: none; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; transition: stroke 0.2s; }
  .cat-btn span { font-size: 9px; color: var(--color-text-tertiary); font-weight: 500; transition: color 0.2s; display: block; }

  .cat-btn:hover, .cat-btn.active {
    border-color: var(--color-border-primary);
    background: var(--color-background-secondary);
    transform: translate(-50%, -50%) scale(1.15);
    box-shadow: 0 4px 16px rgba(0,0,0,0.1);
  }

  .cat-btn:hover svg, .cat-btn.active svg { stroke: var(--color-text-primary); }
  .cat-btn:hover span, .cat-btn.active span { color: var(--color-text-primary); }

  /* Sub-service ring: semi-circular arrangement */
  .sub-btn {
    position: absolute;
    transform: translate(-50%, -50%);
    width: 82px;
    border-radius: var(--border-radius-md);
    border: 0.5px solid var(--color-border-tertiary);
    background: var(--color-background-primary);
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 10px 6px 8px;
    gap: 5px;
    z-index: 15;
    transition: all 0.2s ease;
    text-align: center;
    pointer-events: auto;
  }

  .sub-btn svg { width: 20px; height: 20px; stroke: var(--color-text-secondary); fill: none; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; flex-shrink: 0; }
  .sub-btn span { font-size: 10px; color: var(--color-text-secondary); line-height: 1.3; font-weight: 500; display: block; }

  .sub-btn:hover {
    border-color: var(--color-border-secondary);
    background: var(--color-background-secondary);
    transform: translate(-50%, -50%) scale(1.08);
  }

  .sub-btn:hover svg { stroke: var(--color-text-primary); }
  .sub-btn:hover span { color: var(--color-text-primary); }

  /* Sub ring connector lines via SVG overlay */
  .sub-lines {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 5;
    overflow: visible;
  }

  .sub-line {
    stroke: var(--color-border-secondary);
    stroke-width: 0.75;
    fill: none;
    stroke-dasharray: 3 3;
    opacity: 0;
    transition: opacity 0.25s;
  }

  .sub-line.visible { opacity: 1; }

  /* Fade in subs */
  .sub-btn {
    opacity: 0;
    animation: none;
  }

  .sub-btn.show {
    animation: popIn 0.25s cubic-bezier(0.34,1.56,0.64,1) forwards;
  }

  @keyframes popIn {
    from { opacity: 0; transform: translate(-50%, -50%) scale(0.6); }
    to   { opacity: 1; transform: translate(-50%, -50%) scale(1); }
  }

  /* Info card at bottom */
  .info-card {
    margin-top: 24px;
    width: 100%;
    max-width: 520px;
    padding: 18px 22px;
    border-radius: var(--border-radius-lg);
    border: 0.5px solid var(--color-border-tertiary);
    background: var(--color-background-secondary);
    min-height: 76px;
    transition: all 0.2s ease;
  }

  .info-card h3 { font-size: 14px; font-weight: 500; color: var(--color-text-primary); margin-bottom: 4px; }
  .info-card p  { font-size: 13px; color: var(--color-text-secondary); line-height: 1.5; }

  .hint {
    font-size: 12px;
    color: var(--color-text-tertiary);
    text-align: center;
    margin-top: 8px;
  }
</style>

    <!-- SVG for sub-item connector lines -->
    <svg class="sub-lines" id="subLinesSvg" viewBox="0 0 420 420"></svg>

    <!-- Center -->

  { label: 'Health Services', icon: `<svg viewBox="0 0 24 24"><path d="M4.5 12H2m20 0h-2.5M12 4.5V2m0 20v-2.5M7.05 7.05L5.636 5.636m12.728 12.728L16.95 16.95M16.95 7.05l1.414-1.414M5.636 18.364L7.05 16.95M12 8a4 4 0 100 8 4 4 0 000-8z"/></svg>` },
];

// Override business icon
CATEGORIES[6].icon = `<svg viewBox="0 0 24 24"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 00-2-2h-4a2 2 0 00-2 2v2M12 12v4M10 14h4"/></svg>`;

const wrap = document.getElementById('wheelWrap');
const spokeSvg = document.getElementById('spokeSvg');
const subLinesSvg = document.getElementById('subLinesSvg');
const infoCard = document.getElementById('infoCard');

let activeId = null;
let subElems = [];
let lineElems = [];
let catBtns = {};

function deg2rad(d) { return d * Math.PI / 180; }

function catPos(angle) {
  const r = deg2rad(angle);
  return { x: CX + CAT_R * Math.cos(r), y: CY + CAT_R * Math.sin(r) };
}

// Draw spoke lines
function drawSpokes() {
  spokeSvg.innerHTML = '';
  CATEGORIES.forEach(cat => {
    const p = catPos(cat.angle);
    const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    line.setAttribute('x1', CX); line.setAttribute('y1', CY);
    line.setAttribute('x2', p.x); line.setAttribute('y2', p.y);
    line.setAttribute('stroke', 'var(--color-border-tertiary)');
    line.setAttribute('stroke-width', '1');
    line.setAttribute('stroke-dasharray', '4 4');
    spokeSvg.appendChild(line);
  });
}

function clearSubs() {
  subElems.forEach(el => el.remove());
  lineElems.forEach(el => el.remove());
  subElems = []; lineElems = [];
  subLinesSvg.innerHTML = '';
}

function showSubs(cat) {
  clearSubs();
  const cp = catPos(cat.angle);
  const n = cat.subs.length;

  // Fan angle: spread sub-items in a 140-degree arc centered away from hub
  const spreadDeg = Math.min(140, (n - 1) * 34);
  const startAngle = cat.angle - spreadDeg / 2;
  const stepAngle = n > 1 ? spreadDeg / (n - 1) : 0;

  cat.subs.forEach((sub, i) => {
    const ang = n === 1 ? cat.angle : startAngle + i * stepAngle;
    const sr = deg2rad(ang);
    const sx = cp.x + SUB_R * Math.cos(sr);
    const sy = cp.y + SUB_R * Math.sin(sr);

    // Connector line
    const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    line.setAttribute('x1', cp.x); line.setAttribute('y1', cp.y);
    line.setAttribute('x2', sx); line.setAttribute('y2', sy);
    line.setAttribute('class', 'sub-line');
    line.setAttribute('stroke', 'var(--color-border-secondary)');
    line.setAttribute('stroke-width', '0.75');
    line.setAttribute('stroke-dasharray', '3 3');
    subLinesSvg.appendChild(line);
    lineElems.push(line);
    setTimeout(() => line.classList.add('visible'), 10);

    // Sub button
    const btn = document.createElement('div');
    btn.className = 'sub-btn';
    btn.style.left = sx + 'px';
    btn.style.top = sy + 'px';
    btn.innerHTML = sub.icon + `<span>${sub.label}</span>`;
    wrap.appendChild(btn);
    subElems.push(btn);
    setTimeout(() => btn.classList.add('show'), 20 + i * 40);
  });
}

function activate(cat) {
  if (activeId === cat.id) {
    // deactivate
    activeId = null;
    clearSubs();
    Object.values(catBtns).forEach(b => b.classList.remove('active'));
    infoCard.querySelector('h3').textContent = 'Explore our services';
    infoCard.querySelector('p').textContent = 'Hover over a category to see available services fanning out around it.';
    return;
  }
  activeId = cat.id;
  Object.values(catBtns).forEach(b => b.classList.remove('active'));
  catBtns[cat.id].classList.add('active');
  infoCard.querySelector('h3').textContent = cat.label;
  infoCard.querySelector('p').textContent = cat.desc;
  showSubs(cat);
}

// Build category buttons
CATEGORIES.forEach(cat => {
  const p = catPos(cat.angle);
  const btn = document.createElement('div');
  btn.className = 'cat-btn';
  btn.style.left = p.x + 'px';
  btn.style.top = p.y + 'px';
  btn.innerHTML = cat.icon + `<span>${cat.label}</span>`;
  btn.addEventListener('mouseenter', () => activate(cat));
  btn.addEventListener('click', () => activate(cat));
  wrap.appendChild(btn);
  catBtns[cat.id] = btn;
});

drawSpokes();
</script>
